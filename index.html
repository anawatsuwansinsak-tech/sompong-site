<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สมพงษ์</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  overflow: hidden;
}

/* ตัวหนังสือ */
h1 {
  font-size: 100px;
  font-weight: bold;
  animation: colorChange 1s infinite, shake 0.2s infinite;
}

/* สีรุ้ง */
@keyframes colorChange {
  0% { color: red; }
  25% { color: yellow; }
  50% { color: lime; }
  75% { color: cyan; }
  100% { color: magenta; }
}

/* สั่น ๆ */
@keyframes shake {
  0% { transform: translate(0, 0); }
  25% { transform: translate(5px, -5px); }
  50% { transform: translate(-5px, 5px); }
  75% { transform: translate(5px, 5px); }
  100% { transform: translate(-5px, -5px); }
}
</style>
</head>

<body>
<h1>สมพงษ์</h1>

<!-- เสียง -->
<audio autoplay loop>
  <source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
</audio>

</body>
</html>
